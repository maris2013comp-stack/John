<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOHN — Life OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --s1: #111111;
  --s2: #181818;
  --s3: #1e1e1e;
  --gold: #c9a84c;
  --gold-dim: rgba(201,168,76,0.12);
  --gold-line: rgba(201,168,76,0.22);
  --text: #f0ede8;
  --muted: rgba(240,237,232,0.5);
  --dim: rgba(240,237,232,0.2);
  --r: 11px;
  --r-sm: 7px;
  --sw: 220px;
  --cw: 280px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.18);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(201,168,76,0.35)}

/* LAYOUT */
#app{display:flex;height:100vh;width:100vw}

/* SIDEBAR */
#sidebar{width:var(--sw);min-width:var(--sw);background:var(--s1);border-right:1px solid rgba(255,255,255,0.04);display:flex;flex-direction:column;overflow:hidden}
.sb-logo{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.04)}
.logo-name{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--gold);letter-spacing:4px;line-height:1}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;margin-top:5px}
.sb-nav{flex:1;overflow-y:auto;padding:10px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;color:var(--muted);font-size:13px;transition:all .15s;position:relative}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.nav-item.active{color:var(--gold);background:rgba(201,168,76,0.07)}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--gold);border-radius:0 2px 2px 0}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}

/* LIFE SCORE WIDGET */
.ls-widget{padding:16px 20px 20px;border-top:1px solid var(--gold-line);background:linear-gradient(to bottom,transparent,rgba(201,168,76,0.03));flex-shrink:0}
.ls-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px}
.ls-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.ls-num{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;color:var(--gold);line-height:1}
.ls-bars{display:flex;flex-direction:column;gap:7px}
.ls-row{display:flex;align-items:center;gap:8px}
.ls-rl{font-size:10px;color:var(--muted);width:68px;flex-shrink:0}
.ls-track{flex:1;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.ls-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .6s ease}
.ls-rv{font-size:10px;color:var(--muted);width:24px;text-align:right}

/* MAIN CONTENT */
#content{flex:1;overflow-y:auto;padding:28px;min-width:0}

/* CARDS */
.card{background:var(--s2);border-radius:var(--r);border-top:1px solid var(--gold-line);padding:20px;margin-bottom:14px}
.card-sm{background:var(--s2);border-radius:var(--r);border-top:1px solid var(--gold-line);padding:15px}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:600;color:var(--text);letter-spacing:1px;text-transform:uppercase}

/* MORNING BRIEF */
.brief{background:linear-gradient(135deg,#111111 0%,#131209 100%);border-radius:var(--r);border-top:1px solid var(--gold-line);padding:24px;margin-bottom:14px;position:relative;overflow:hidden}
.brief::after{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(201,168,76,0.05) 0%,transparent 70%);pointer-events:none}
.brief-greet{font-family:'Syne',sans-serif;font-size:23px;font-weight:700;margin-bottom:4px}
.brief-date{font-size:12px;color:var(--muted);margin-bottom:16px}
.brief-body{font-size:13.5px;color:rgba(240,237,232,0.72);line-height:1.75;border-left:2px solid var(--gold);padding-left:14px}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.stat-card{background:var(--s2);border-radius:var(--r);border-top:1px solid var(--gold-line);padding:16px}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.stat-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:700}
.stat-unit{font-size:13px;color:var(--gold);margin-left:2px}
.stat-sub{font-size:11px;color:var(--dim);margin-top:4px}

/* TABS */
.tabs{display:flex;gap:2px;background:rgba(255,255,255,0.03);border-radius:7px;padding:3px;margin-bottom:14px}
.tab{flex:1;padding:7px 10px;border:none;background:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border-radius:5px;transition:all .15s}
.tab.active{background:var(--s3);color:var(--gold)}

/* TASKS */
.task-list{display:flex;flex-direction:column;gap:7px;min-height:40px}
.task-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s1);border-radius:var(--r-sm);transition:background .15s}
.task-item:hover{background:rgba(255,255,255,0.04)}
.task-check{width:18px;height:18px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.15);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;background:none;font-size:10px;color:white}
.task-check.done{background:#2a7a4b;border-color:#2a7a4b}
.task-txt{flex:1;font-size:13px}
.task-txt.done{text-decoration:line-through;color:var(--muted)}
.task-dl{font-size:11px;color:var(--dim);flex-shrink:0}
.task-progress{margin-top:12px}
.progress-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px}
.pbar{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(to right,var(--gold),rgba(201,168,76,0.55));border-radius:2px;transition:width .4s ease}
.add-task-btn{display:flex;align-items:center;gap:8px;padding:9px 12px;background:none;border:1px dashed rgba(255,255,255,0.07);border-radius:var(--r-sm);color:var(--muted);font-size:12px;cursor:pointer;width:100%;margin-top:8px;transition:all .15s;font-family:'Inter',sans-serif}
.add-task-btn:hover{border-color:var(--gold-line);color:var(--gold)}
.empty-state{text-align:center;padding:20px;color:var(--dim);font-size:13px}

/* MOOD */
.mood-emojis{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.mood-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:9px 11px;background:var(--s1);border:1px solid transparent;border-radius:var(--r-sm);cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
.mood-btn:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.07)}
.mood-btn.selected{border-color:var(--gold);background:var(--gold-dim)}
.mood-emoji{font-size:20px}
.mood-lbl{font-size:10px;color:var(--muted)}
.energy-dots{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.edot{width:28px;height:28px;border-radius:50%;background:var(--s1);border:1px solid rgba(255,255,255,0.06);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);transition:all .15s;font-family:'Inter',sans-serif}
.edot.active{background:var(--gold);border-color:var(--gold);color:#0a0a0a;font-weight:600}

/* INPUTS */
input[type=text],input[type=number],input[type=password],input[type=date],textarea,select{background:var(--s1);border:1px solid rgba(255,255,255,0.07);border-radius:var(--r-sm);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:10px 12px;width:100%;outline:none;transition:border-color .15s;resize:none}
input[type=text]:focus,input[type=number]:focus,input[type=password]:focus,textarea:focus,select:focus{border-color:rgba(201,168,76,0.3)}
input::placeholder,textarea::placeholder{color:var(--dim)}
select option{background:var(--s2)}

/* BUTTONS */
.btn{padding:9px 18px;border-radius:var(--r-sm);border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;transition:all .15s}
.btn-gold{background:var(--gold);color:#0a0a0a}
.btn-gold:hover{background:#d4b060}
.btn-ghost{background:rgba(255,255,255,0.05);color:var(--muted)}
.btn-ghost:hover{background:rgba(255,255,255,0.09);color:var(--text)}
.btn-sm{padding:5px 12px;font-size:12px}

/* CHAT */
#chat{width:var(--cw);min-width:var(--cw);background:var(--s1);border-left:1px solid rgba(255,255,255,0.04);border-top:2px solid var(--gold-line);display:flex;flex-direction:column}
.chat-hdr{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.04);flex-shrink:0}
.chat-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--gold);letter-spacing:1px}
.chat-status{font-size:11px;color:var(--muted);margin-top:2px}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px}
.msg{max-width:96%;padding:10px 12px;border-radius:10px;font-size:13px;line-height:1.55}
.msg-user{align-self:flex-end;background:var(--gold-dim);border:1px solid var(--gold-line);color:var(--text)}
.msg-ai{align-self:flex-start;background:var(--s2);color:var(--text);border:1px solid rgba(255,255,255,0.05)}
.msg-ai-name{font-size:10px;color:var(--gold);font-weight:600;letter-spacing:1px;margin-bottom:4px}
.chat-input-area{padding:12px;border-top:1px solid rgba(255,255,255,0.04);flex-shrink:0}
.chat-row{display:flex;gap:6px;align-items:flex-end}
.chat-in{flex:1;background:var(--s2);border:1px solid rgba(255,255,255,0.07);border-radius:9px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:9px 12px;outline:none;resize:none;max-height:100px;transition:border-color .15s}
.chat-in:focus{border-color:rgba(201,168,76,0.3)}
.chat-send-btn{width:34px;height:34px;border-radius:9px;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:13px;color:#0a0a0a}
.chat-send-btn:hover{background:#d4b060}
.chat-send-btn:disabled{opacity:.35;cursor:not-allowed}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(5px)}
.modal{background:var(--s2);border-radius:14px;border-top:2px solid var(--gold);padding:32px;width:420px;max-width:90vw}
.modal-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--gold);margin-bottom:8px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.65}

/* TYPING */
.typing{display:flex;gap:3px;padding:4px 0}
.typing span{width:5px;height:5px;background:var(--gold);border-radius:50%;opacity:.5;animation:bounce 1s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-4px);opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.shimmer{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px}
.inv-total{background:linear-gradient(135deg,#111111,#131108);border-radius:var(--r);border-top:2px solid var(--gold-line);padding:28px 24px;margin-bottom:14px;text-align:center}
.news-card{background:var(--s2);border-radius:var(--r);padding:18px 20px;position:relative;overflow:hidden;transition:box-shadow .2s,transform .2s;cursor:default}
.news-card:hover{box-shadow:0 6px 28px rgba(0,0,0,0.45);transform:translateY(-1px)}
.news-glow{position:absolute;top:0;right:0;width:100px;height:100px;pointer-events:none;border-radius:50%}

/* SECTION */
.sec-hdr{margin-bottom:22px}
.sec-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:700}
.sec-sub{font-size:13px;color:var(--muted);margin-top:4px}

/* DREAM TRACKER */
.dream-card{background:linear-gradient(135deg,#111111,#12100d);border-radius:var(--r);border-top:1px solid var(--gold-line);padding:20px;margin-bottom:14px}
.dream-bar-track{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin:10px 0 8px}
.dream-bar-fill{height:100%;background:linear-gradient(to right,var(--gold),rgba(201,168,76,0.45));border-radius:3px;transition:width .8s ease}

/* PREDICTION */
.pred-card{background:var(--s2);border-radius:var(--r-sm);border-left:2px solid var(--gold);padding:11px 14px;margin-bottom:8px;font-size:13px;color:rgba(240,237,232,.75);line-height:1.55}

/* PLACEHOLDER */
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:380px;gap:12px;opacity:.5}
.placeholder-icon{font-size:52px}
.placeholder-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:600}
.placeholder-sub{font-size:13px;color:var(--muted)}

/* QUEST BADGE */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}

/* GRID HELPERS */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.col{display:flex;flex-direction:column;gap:8px}
.row{display:flex;align-items:center;gap:8px}
.mt8{margin-top:8px}
.mt12{margin-top:12px}
.mt16{margin-top:16px}
.gold{color:var(--gold)}
.sm{font-size:12px}
.xs{font-size:11px}
.fw6{font-weight:600}
.syne{font-family:'Syne',sans-serif}

/* MOBILE */
.mobile-topbar{display:none;position:fixed;top:0;left:0;right:0;height:52px;background:var(--s1);border-bottom:1px solid rgba(255,255,255,0.06);align-items:center;justify-content:space-between;padding:0 14px;z-index:150}
.mob-btn{background:none;border:none;cursor:pointer;color:var(--text);font-size:20px;padding:8px;line-height:1;border-radius:6px;transition:background .15s}
.mob-btn:hover{background:rgba(255,255,255,0.08)}
.mob-logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--gold);letter-spacing:3px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.62);z-index:145}
.sidebar-overlay.open{display:block}
@media(max-width:768px){
  .mobile-topbar{display:flex}
  #app{padding-top:52px}
  .sb-logo{display:none}
  #sidebar{position:fixed;left:-260px;top:52px;bottom:0;width:240px;min-width:240px;z-index:155;transition:left .25s ease}
  #sidebar.open{left:0}
  #content{padding:14px;height:calc(100vh - 52px)}
  #chat{position:fixed;right:-110%;top:52px;bottom:0;width:min(360px,100vw);min-width:0;z-index:155;transition:right .25s ease}
  #chat.open{right:0}
  .stats-row{grid-template-columns:repeat(2,1fr)!important}
  .grid-2{grid-template-columns:1fr!important}
  [style*="grid-template-columns:repeat(2,1fr)"]{grid-template-columns:1fr!important}
  [style*="grid-template-columns:2fr 1fr 1fr 1fr"]{grid-template-columns:1fr 1fr!important}
  .brief{padding:16px}
  .sec-title{font-size:20px}
  .modal{padding:20px;width:calc(100vw - 32px)}
  .inv-total{padding:20px 16px}
  .ls-rl{width:54px}
}
</style>
</head>
<body>
<div class="mobile-topbar">
  <button class="mob-btn" onclick="toggleSidebar()">☰</button>
  <div class="mob-logo">JOHN</div>
  <button class="mob-btn" onclick="toggleChat()">💬</button>
</div>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="app">

  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="sb-logo">
      <div class="logo-name">JOHN</div>
      <div class="logo-sub">Life OS</div>
    </div>
    <div class="sb-nav" id="nav"></div>
    <div class="ls-widget" id="ls-widget"></div>
  </nav>

  <!-- MAIN CONTENT -->
  <main id="content"></main>

  <!-- JOHN AI CHAT -->
  <aside id="chat">
    <div class="chat-hdr">
      <div class="chat-title">JOHN AI</div>
      <div class="chat-status" id="chat-status">● Aktīvs</div>
    </div>
    <div class="chat-msgs" id="chat-msgs"></div>
    <div class="chat-input-area">
      <div class="chat-row">
        <textarea class="chat-in" id="chat-in" placeholder="Jautā JOHN..." rows="1"></textarea>
        <button class="chat-send-btn" id="chat-send">➤</button>
      </div>
    </div>
  </aside>
</div>


<script>
// ─── STATE ───────────────────────────────────────────────
const S = {
  sec: 'dashboard',
  activeTab: 'today',
  addingTask: false,
  selMoods: [],
  energy: 0,
  tasks: load('tasks', {today:[],week:[],month:[],year:[]}),
  mood: load('mood', {}),
  journal: load('journal', []),
  finance: load('finance', {income:[],expenses:[],monthlyGoal:0}),
  body: load('body', {}),
  inv: load('inv', {gold:0,silver:0,stocks:[]}),
  dream: load('dream', {name:'',target:0,current:0}),
  brain: load('brain', []),
  ls: load('ls', {finance:0,health:0,productivity:0,sleep:0,mood:0}),
  chat: load('chat', []),
  goals: load('goals', []),
  news: load('news', []),
  ideas: load('ideas', []),
  kb: load('kb', []),
  reviews: load('reviews', []),
  moodLog: load('moodLog', []),
};

function load(k, def) {
  try { return JSON.parse(localStorage.getItem('j_'+k)) ?? def; }
  catch { return def; }
}
function save(k) { localStorage.setItem('j_'+k, JSON.stringify(S[k])); }

// ─── NAV CONFIG ──────────────────────────────────────────
const NAV = [
  {id:'dashboard',icon:'⚡',lbl:'Dashboard'},
  {id:'goals',icon:'🎯',lbl:'Goals'},
  {id:'side-quests',icon:'🗺️',lbl:'Side Quests'},
  {id:'journal',icon:'📓',lbl:'Journal'},
  {id:'second-brain',icon:'🧠',lbl:'Second Brain'},
  {id:'finance',icon:'💰',lbl:'Finance'},
  {id:'body',icon:'💪',lbl:'Body'},
  {id:'settings',icon:'⚙️',lbl:'Settings'},
];
// Hidden from nav (functionality preserved in code):
// investments -> Finance > Investīcijas tab
// mood        -> Body > Garastāvoklis section
// ideas       -> Second Brain > Idejas tab
// news, knowledge, ceo-review, timeline -> hidden, re-enable when ready

// ─── UTILS ───────────────────────────────────────────────
function greet() {
  const h = new Date().getHours();
  return h<12 ? 'Labrīt, Boss' : h<18 ? 'Labdien, Boss' : 'Labvakar, Boss';
}

function dateStr() {
  const DAYS = ['Svētdiena','Pirmdiena','Otrdiena','Trešdiena','Ceturtdiena','Piektdiena','Sestdiena'];
  const MONTHS = ['janvāris','februāris','marts','aprīlis','maijs','jūnijs','jūlijs','augusts','septembris','oktobris','novembris','decembris'];
  const d = new Date();
  return `${DAYS[d.getDay()]}, ${d.getDate()}. ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}

function lsTotal() {
  const v = Object.values(S.ls);
  return Math.round(v.reduce((a,b)=>a+b,0)/v.length);
}

function todayStats() {
  const t = S.tasks.today||[];
  return {total:t.length, done:t.filter(x=>x.done).length};
}

function streak() { return parseInt(localStorage.getItem('j_streak')||'0'); }

function monthlySavings() {
  const m=new Date().getMonth(), y=new Date().getFullYear();
  const inc=(S.finance.income||[]).filter(i=>{const d=new Date(i.date);return d.getMonth()===m&&d.getFullYear()===y;}).reduce((a,i)=>a+Number(i.amount),0);
  const exp=(S.finance.expenses||[]).filter(e=>{const d=new Date(e.date);return d.getMonth()===m&&d.getFullYear()===y;}).reduce((a,e)=>a+Number(e.amount),0);
  return Math.max(0, inc-exp);
}

function totalBalance() {
  const inc=(S.finance.income||[]).reduce((a,i)=>a+Number(i.amount),0);
  const exp=(S.finance.expenses||[]).reduce((a,e)=>a+Number(e.amount),0);
  return inc-exp;
}

// ─── DYNAMIC PREDICTIONS ─────────────────────────────────
function dreamYearEstimate() {
  if(!S.dream.target||!S.dream.current) return 'Pievieno datus, lai JOHN varētu prognozēt.';
  const remaining = S.dream.target - S.dream.current;
  const sav = monthlySavings();
  if(sav<=0) return 'Sāc ietaupīt, lai JOHN varētu prognozēt termiņu.';
  const months = Math.ceil(remaining/sav);
  const year = new Date().getFullYear() + Math.floor(months/12);
  const mo = months%12;
  return `JOHN prognozē: mērķi sasniegsi aptuveni <span class="gold">${year}. gadā${mo>0?' ('+mo+' mēn.)':''}</span>`;
}

function renderPredictions(str, sav) {
  const preds = [];
  if(S.dream.target>0 && sav>0) {
    const months = Math.ceil((S.dream.target-S.dream.current)/sav);
    const year = new Date().getFullYear()+Math.floor(months/12);
    preds.push(`📊 Ja turpināsi krāt šajā tempā (€${fmt(sav)}/mēn.), sapni sasniegsi <span class="gold">${year}. gadā</span>.`);
  } else if(S.dream.target>0) {
    preds.push(`📊 Ieviadi finanšu datus, lai JOHN varētu prognozēt kad sasniegsi sapni.`);
  }
  if(str>0) {
    const next = str<7?7:str<14?14:str<30?30:str<100?100:Math.ceil(str/100)*100;
    preds.push(`🔥 Streak ${str} dienas — vēl ${next-str} līdz milstazei <span class="gold">${next} dienas</span>!`);
  } else {
    preds.push(`🔥 Sāc savu pirmo streak dienu šodien — katrs lielais streak sākas ar 1.`);
  }
  if(S.body.sleep>0 && S.body.sleep<6.5) {
    preds.push(`😴 Miegs ${S.body.sleep}h ir zem ieteicamā — nepietiekams miegs samazina produktivitāti par ~30%.`);
  } else if(todayStats().total>0) {
    const pct = Math.round(todayStats().done/todayStats().total*100);
    preds.push(`✅ Šodienas uzdevumu izpilde: ${pct}%. ${pct>=80?'Lielisks temps, Boss!':pct>=50?'Vai vari pievienot vēl vienu uzdevumu?':'Vēl ir laiks panākt — fokusējies!'}`);
  } else {
    preds.push(`💡 Pievieno šodienas uzdevumus, lai JOHN varētu sekot tavam progresam.`);
  }
  if(preds.length===0) return `<div class="empty-state">Pievieno datus, lai JOHN varētu ģenerēt prognozes.</div>`;
  return preds.map(p=>`<div class="pred-card">${p}</div>`).join('');
}

function switchTab(t) { S.activeTab=t; S.addingTask=false; document.getElementById('task-area').innerHTML=renderTasks(); }
function toggleTask(tab,i) {
  S.tasks[tab][i].done=!S.tasks[tab][i].done; save('tasks');
  const td=S.tasks.today||[]; const d=td.filter(x=>x.done).length;
  S.ls.productivity=td.length?Math.round(d/td.length*100):50; save('ls'); renderLS();
  document.getElementById('task-area').innerHTML=renderTasks();
}
function startTask() { S.addingTask=true; document.getElementById('task-area').innerHTML=renderTasks(); setTimeout(()=>document.getElementById('new-task')?.focus(),50); }
function cancelTask() { S.addingTask=false; document.getElementById('task-area').innerHTML=renderTasks(); }
function confirmTask() {
  const v=document.getElementById('new-task')?.value.trim(); if(!v) return;
  if(!S.tasks[S.activeTab]) S.tasks[S.activeTab]=[];
  S.tasks[S.activeTab].push({text:v,done:false,dl:''}); save('tasks');
  S.addingTask=false; document.getElementById('task-area').innerHTML=renderTasks();
}
function taskKey(e) { if(e.key==='Enter') confirmTask(); if(e.key==='Escape') cancelTask(); }

async function generateQuestsWithAI(force) {
  const today=new Date().toDateString();
  const stored=load('quests',[]);
  if(!force&&stored.length>0&&stored[0].date===today&&stored[0].ai)return;
  const genBtn=document.getElementById('quest-gen-btn');
  const questsEl=document.getElementById('quests-container');
  if(genBtn){genBtn.disabled=true;genBtn.textContent='⏳ Ģenerē...';}
  if(questsEl)questsEl.innerHTML=`<div style="text-align:center;padding:36px"><div class="typing" style="justify-content:center"><span></span><span></span><span></span></div><div class="xs" style="color:var(--muted);margin-top:12px">JOHN ģenerē tev unikālus side quests...</div></div>`;
  const goals=(S.goals||[]).filter(g=>g.status==='Aktīvs').map(g=>g.name).slice(0,5).join(', ')||'vispārēja izaugsme';
  const energy=S.body.energy||5;
  try{
    const text=await callJohnAI(`JOHN AI. Enerģija ${energy}/10, mērķi: ${goals}. Ģenerē 3 side quests šodienai. JSON tikai: {"quests":[{"t":"nosaukums lv","d":"apraksts 1 teikums","diff":"easy"},{"t":"nosaukums","d":"apraksts","diff":"medium"},{"t":"nosaukums","d":"apraksts","diff":"hard"}]}`,150);
    const m=text.match(/\{[\s\S]*\}/);
    if(!m)throw new Error('Nav JSON');
    const data=JSON.parse(m[0]);
    if(!data.quests||data.quests.length<3)throw new Error('Nepilnīga atbilde');
    const q=data.quests.slice(0,3).map(x=>({t:x.t,d:x.d,diff:x.diff||'medium',date:today,done:false,ai:true}));
    localStorage.setItem('j_quests',JSON.stringify(q));
    showToast('✓ Jauni AI side quests ģenerēti!');renderContent();
  }catch(err){
    showToast('⚠️ '+err.message);if(questsEl)renderContent();
  }
  if(genBtn){genBtn.disabled=false;genBtn.textContent='⚡ Ģenerēt jaunus';}
}

function initSideQuests() {
  const today=new Date().toDateString();
  const stored=load('quests',[]);
  if(stored.length===0||stored[0].date!==today||!stored[0].ai)generateQuestsWithAI(false);
}

async function analyzeNutritionAI() {
  const input=document.getElementById('nutrition-ai-input')?.value.trim();
  if(!input)return showToast('Apraksti ko ēdi šodien!');
  const btn=document.getElementById('nutri-ai-btn');
  if(btn){btn.disabled=true;btn.textContent='⏳ Analizē...';}
  try{
    const text=await callJohnAI(`Uztura analīze. Ēdiens: "${input}". JSON tikai: {"score":"Labs|Vidējs|Slikts","feedback":"1 teikums latviski — galvenais ieteikums."}`,150);
    const m=text.match(/\{[\s\S]*?\}/);if(!m)throw new Error('Nav JSON');
    const d=JSON.parse(m[0]);
    S.body.nutrition=d.score;S.body.nutritionAIResult=d.feedback;
    save('body');renderContent();showToast('✓ Uztura analīze gatava!');
  }catch(err){
    showToast('Kļūda: '+err.message);
    if(btn){btn.disabled=false;btn.textContent='🤖 Analizēt ar JOHN';}
  }
}

// ─── JOHN AI HELPER (web search + plain) ─────────────────
const HAIKU='claude-haiku-4-5-20251001';
const SONNET='claude-sonnet-4-6';
const CACHE_TTL=6*60*60*1000; // 6 hours

async function callJohnAI(prompt, maxTokens=150, useSearch=false, model=HAIKU) {
  const body={model,max_tokens:maxTokens,messages:[{role:'user',content:prompt}]};
  if(useSearch){body.tools=[{"type":"web_search_20250305","name":"web_search","max_uses":3}];body._beta='web-search-2025-03-05';}
  const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'API kļūda '+r.status);}
  const data=await r.json();
  return(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
}

    const text=await callJohnAI(`S&P 500 cena šodien ${today}. JSON tikai: {"price":"XXXX","change":"+X.XX","changePercent":"+X.X%","trend":"up","analysis":"1 teikums lv."}`,150,true);

    const d=JSON.parse(m[0]);d.ts=Date.now();

  const items=S.inv.items||[];
  const total=items.reduce((a,x)=>a+Number(x.amount),0);
  const itemsList=items.map(x=>`${x.name} €${fmt(x.amount)}`).join(', ')||'nav ierakstu';
  try{
    const text=await callJohnAI(`Portfelis: ${itemsList}. €${fmt(total.toFixed(0))} kopā. Tirgus šodien + ieteikums. JSON tikai: {"advice":"2 teikumi lv — tirgus un ieteikums."}`,150,true);
    const m=text.match(/\{[\s\S]*?\}/);

    const d=JSON.parse(m[0]);
    const cache={advice:d.advice,ts:Date.now()};
    localStorage.setItem('j_inv_advice',JSON.stringify(cache));
    if(cont)cont.innerHTML=`<div class="pred-card" style="border-left-color:#4caf7a;font-size:13px;line-height:1.7">${d.advice}</div><div class="xs" style="color:var(--dim);text-align:right;margin-top:6px">Atjaunots ${new Date().toLocaleTimeString('lv',{hour:'2-digit',minute:'2-digit'})}</div>`;

}

function selectGoalCat(cat) {
  _selGoalCat=cat;
  Object.entries(GOAL_CAT_COLORS).forEach(([name,col])=>{
    const btn=document.getElementById('gcat-'+name);if(!btn)return;
    if(name===cat){btn.style.borderColor=col;btn.style.background=col+'22';btn.style.color=col;}
    else{btn.style.borderColor='rgba(255,255,255,0.08)';btn.style.background='transparent';btn.style.color='var(--muted)';}
  });
}

function selectGoalDeadline(type) {
  _selGoalDeadline=type;
  ['today','week','month','year','custom'].forEach(d=>{
    const btn=document.getElementById('gdl-'+d);if(!btn)return;
    btn.className='btn btn-'+(d===type?'gold':'ghost')+' btn-sm';
  });
  const cd=document.getElementById('gm-custom-date');if(cd)cd.style.display=type==='custom'?'block':'none';
}

function getGoalDeadlineDate() {
  const now=new Date();
  if(_selGoalDeadline==='today')return now.toISOString().split('T')[0];
  if(_selGoalDeadline==='week'){const d=new Date(now);d.setDate(d.getDate()+7);return d.toISOString().split('T')[0];}
  if(_selGoalDeadline==='month')return new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split('T')[0];
  if(_selGoalDeadline==='year')return `${now.getFullYear()}-12-31`;
  if(_selGoalDeadline==='custom')return document.getElementById('gm-date')?.value||'';
  return '';
}

function closeAddGoalModal(){document.getElementById('add-goal-ov')?.remove();}

function submitAddGoal(){
  const name=document.getElementById('gm-name')?.value.trim();
  if(!name){showToast('Ievadi mērķa nosaukumu!');return;}
  S.goals.push({name,desc:document.getElementById('gm-why')?.value.trim()||'',cat:_selGoalCat,date:getGoalDeadlineDate(),status:'Aktīvs',created:new Date().toISOString()});
  save('goals');closeAddGoalModal();showToast('✓ Mērķis pievienots!');renderContent();
}

function setGoalStatus(i,s){S.goals[i].status=s;save('goals');renderContent();}

function deleteGoal(i){if(!confirm('Dzēst šo mērķi?'))return;S.goals.splice(i,1);save('goals');renderContent();}

function renderNews() {

    <button class="btn btn-${newsFilter==='Visi'?'gold':'ghost'} btn-sm" onclick="newsFilter='Visi';renderContent()">Visi (${articles.length})</button>
    ${Object.keys(NEWS_COLORS).map(c=>{const n=articles.filter(a=>a.cat===c).length;return n?`<button class="btn btn-${newsFilter===c?'gold':'ghost'} btn-sm" onclick="newsFilter='${c}';renderContent()">${NEWS_EMOJI[c]||''} ${c} (${n})</button>`:''}).join('')}

function renderNewsCards(articles) {

async function fetchJohnNews() {
  const btn=document.getElementById('news-btn'),feed=document.getElementById('news-feed');
  if(btn){btn.textContent='⏳ Meklē...';btn.disabled=true;}
  if(feed)feed.innerHTML=`<div style="display:flex;flex-direction:column;gap:12px">
    ${Array(3).fill(0).map(()=>`<div style="background:var(--s2);border-radius:var(--r);border-top:2px solid rgba(255,255,255,0.05);padding:18px 20px">
      <div class="shimmer" style="height:10px;width:25%;margin-bottom:12px"></div>
      <div class="shimmer" style="height:17px;width:88%;margin-bottom:8px"></div>
      <div class="shimmer" style="height:13px;width:70%;margin-bottom:6px"></div>
    </div>`).join('')}
  </div>`;
  try{
    const today=new Date().toLocaleDateString('lv',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    const text=await callJohnAI(
      `Šodien ir ${today}. Meklē 3 svarīgākās ziņas no pēdējām 24 stundām (dažādas tēmas). JSON tikai: [{"cat":"Kategorija","headline":"Virsraksts","source":"Avots","summary":"1 teikums lv.","time":"pirms X st."},...]`,
      500,true,SONNET
    );
    const m=text.match(/\[[\s\S]*\]/);
    if(!m)throw new Error('Neizdevās iegūt ziņas no AI atbildes');
    const arts=JSON.parse(m[0]);
    if(!Array.isArray(arts)||!arts.length)throw new Error('Nav ziņu masīvā');
    localStorage.setItem('j_news_cache',JSON.stringify({articles:arts,ts:Date.now()}));
    if(feed)feed.innerHTML=renderNewsCards(newsFilter==='Visi'?arts:arts.filter(a=>a.cat===newsFilter));
    renderContent();
  }catch(e){
    if(feed)feed.innerHTML=`<div style="text-align:center;padding:30px">
      <div style="color:#e05555;margin-bottom:8px;font-size:14px">⚠️ ${e.message}</div>
      <div class="xs" style="color:var(--dim)">Pārbaudi vai API atslēga ir pareiza (⚙️ Settings) un mēģini vēlreiz.</div>
    </div>`;
  }
  if(btn){btn.textContent='🔄 Atjaunot';btn.disabled=false;}
}

// ─── WEEKLY CEO REVIEW ────────────────────────────────────
function getWeekLabel(offset=0) {
  const d=new Date(); d.setDate(d.getDate()-d.getDay()+1+offset*7);
  const end=new Date(d); end.setDate(d.getDate()+6);
  return `${d.toLocaleDateString('lv',{day:'numeric',month:'short'})} – ${end.toLocaleDateString('lv',{day:'numeric',month:'short',year:'numeric'})}`;
}

function autoWeekStats() {
  const now=new Date(); const weekAgo=new Date(now-7*86400000);
  const weekIncome=(S.finance.income||[]).filter(i=>new Date(i.date)>=weekAgo).reduce((a,i)=>a+Number(i.amount),0);
  const weekExp=(S.finance.expenses||[]).filter(e=>new Date(e.date)>=weekAgo).reduce((a,e)=>a+Number(e.amount),0);
  const weekBody=load('bodyLog',[]).filter(e=>new Date(e.date)>=weekAgo);
  const avgSleep=weekBody.length?Math.round(weekBody.reduce((a,e)=>a+(e.sleep||0),0)/weekBody.length*10)/10:null;
  const workouts=weekBody.filter(e=>e.workout).length;
  const weekMoods=S.moodLog.filter(e=>new Date(e.date)>=weekAgo);
  const avgEnergy=weekMoods.length?Math.round(weekMoods.reduce((a,e)=>a+(e.energy||0),0)/weekMoods.length*10)/10:null;
  const tasksAll=[...(S.tasks.today||[]),...(S.tasks.week||[])];
  const tasksDone=tasksAll.filter(t=>t.done).length;
  return {weekIncome,weekExp,avgSleep,workouts,avgEnergy,tasksDone,totalTasks:tasksAll.length};
}

let tlMonth='';

function gatherTimelineEvents() {
  const events=[];
  (S.journal||[]).forEach(e=>events.push({date:e.date,type:'journal',icon:'📓',title:'Žurnāla ieraksts',body:e.text.substring(0,120)+'...'}));
  (S.moodLog||[]).forEach(e=>events.push({date:e.date,type:'mood',icon:(e.moods||[])[0]?MOOD_MAP[(e.moods||[])[0]]||'😊':'😊',title:'Garastāvoklis: '+(e.moods||[]).join(', ')||'Ieraksts',body:`Enerģija ${e.energy||0}/10${e.notes?' · "'+e.notes.substring(0,60)+'"':''}`}));
  const quests=load('quests',[]);
  quests.filter(q=>q.done).forEach(q=>events.push({date:q.date,type:'quest',icon:'🗺️',title:'Side Quest izpildīts',body:q.t}));
  (S.goals||[]).filter(g=>g.status==='Pabeigts').forEach(g=>events.push({date:g.created,type:'goal',icon:'🎯',title:'Mērķis sasniegts: '+g.name,body:g.desc||''}));

async function sendMsg() {

// ─── GOOGLE CALENDAR ──────────────────────────────────────
let _calStatus = null;

async function getCalStatus(force) {
  if (!force && _calStatus !== null) return _calStatus;
  try {
    const r = await fetch('/api/calendar/status');
    _calStatus = await r.json();
  } catch { _calStatus = { configured: false, connected: false }; }
  return _calStatus;
}

async function initDashboardCalendar() {
  const status = await getCalStatus();
  const el = document.getElementById('cal-events-content');
  if (!el) return;

  if (!status.configured) {
    el.innerHTML = `<div class="empty-state" style="padding:12px;font-size:12px">Google Calendar nav iestatīts. <span class="gold" style="cursor:pointer" onclick="go('settings')">Iestatī ⚙️</span></div>`;
    return;
  }
  if (!status.connected) {
    el.innerHTML = `<div style="text-align:center;padding:14px">
      <div style="color:var(--muted);font-size:12px;margin-bottom:10px">Nav savienots ar Google Calendar</div>
      <button class="btn btn-gold btn-sm" onclick="calConnect()">Savienot ar Google</button>
    </div>`;
    return;
  }

  el.innerHTML = '<div class="xs" style="color:var(--muted);padding:8px">Ielādē...</div>';
  try {
    const [evResp, taskResp] = await Promise.all([
      fetch('/api/calendar/events'),
      fetch('/api/calendar/tasks'),
    ]);

    const evData = await evResp.json();
    if (!evResp.ok) throw new Error(evData.error || 'Kļūda');
    const events = evData.events || [];

    let tasks = [];
    let needsTaskScope = false;
    if (taskResp.ok) {
      tasks = (await taskResp.json()).tasks || [];
    } else if (taskResp.status === 403) {
      needsTaskScope = true;
    }

    const total = events.length + tasks.length;
    const briefCal = document.getElementById('brief-cal');
    if (briefCal && total > 0) {
      briefCal.textContent = `📅 ${total} notikum${total === 1 ? 's' : 'i'} šodien. `;
    }

    if (events.length === 0 && tasks.length === 0) {
      el.innerHTML = `<div class="empty-state" style="padding:12px">Šodien nav plānotu notikumu 🎉</div>
        ${needsTaskScope ? `<div style="padding:6px 4px;font-size:11px;color:var(--muted)">⚠️ Google Tasks nav redzami — <span class="gold" style="cursor:pointer" onclick="reconnectCalendar()">atkārtoti savienojies</span> lai piešķirtu atļauju.</div>` : ''}`;
      return;
    }

    let html = '<div style="display:flex;flex-direction:column;gap:6px">';

    events.forEach(e => {
      const timeStr = e.allDay ? 'Visa diena' : fmtEventTime(e.start);
      const endStr = !e.allDay && e.end ? '–' + fmtEventTime(e.end) : '';
      const color = e.calendarColor || 'var(--gold)';
      html += `<div class="task-item">
        <span style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0;display:inline-block;margin-top:2px"></span>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.title}</div>
          <div class="xs" style="color:var(--dim)">${e.calendarName}${e.location ? ' · ' + e.location : ''}</div>
        </div>
        <span class="xs" style="color:var(--gold);flex-shrink:0;font-weight:600;margin-left:8px">${timeStr}${endStr ? ' ' + endStr : ''}</span>
      </div>`;
    });

    if (tasks.length > 0) {
      if (events.length > 0) {
        html += `<div style="font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:6px 2px 2px;border-top:1px solid rgba(255,255,255,0.05);margin-top:2px">Uzdevumi</div>`;
      }
      tasks.forEach(t => {
        const dueStr = t.due ? fmtTaskDue(t.due) : '';
        const overdue = t.due && new Date(t.due) < new Date(new Date().toDateString());
        html += `<div class="task-item">
          <span style="font-size:13px;flex-shrink:0">☑</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</div>
            <div class="xs" style="color:var(--dim)">${t.listName}</div>
          </div>
          ${dueStr ? `<span class="xs" style="color:${overdue ? '#e05555' : 'var(--muted)'};flex-shrink:0;margin-left:8px">${dueStr}</span>` : ''}
        </div>`;
      });
    }

    html += '</div>';

    if (needsTaskScope) {
      html += `<div style="padding:8px 4px 0;font-size:11px;color:var(--muted)">⚠️ <span class="gold" style="cursor:pointer" onclick="reconnectCalendar()">Atkārtoti savienojies</span> lai redzētu Google Tasks.</div>`;
    }

    el.innerHTML = html;
  } catch (err) {
    el.innerHTML = `<div class="empty-state" style="padding:12px;color:#e05555;font-size:12px">${err.message}</div>`;
  }
}

function fmtTaskDue(iso) {
  const d = new Date(iso);
  const today = new Date(); today.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  if (diff < 0) return `Kavējas ${Math.abs(diff)}d`;
  if (diff === 0) return 'Šodien';
  if (diff === 1) return 'Rīt';
  return d.toLocaleDateString('lv', { day: 'numeric', month: 'short' });
}

async function reconnectCalendar() {
  await fetch('/api/calendar/disconnect', { method: 'DELETE' });
  _calStatus = null;
  calConnect();
}

function fmtEventTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('lv', { hour: '2-digit', minute: '2-digit' });
}

            <code style="background:var(--s1);padding:5px 10px;border-radius:4px;display:block;margin-top:5px;line-height:1.8">GOOGLE_CLIENT_ID=tava_client_id<br>GOOGLE_CLIENT_SECRET=tavs_client_secret</code>
          </li>
          <li>Restartē serveri un atsvaidzini lapu</li>
        </ol>
      </div>`;
    return;
  }

  if (status.connected) {
    el.innerHTML = `
      <div class="row" style="gap:10px;margin-bottom:14px">
        <div style="width:8px;height:8px;border-radius:50%;background:#4caf7a;flex-shrink:0"></div>
        <span style="font-size:13px;color:#4caf7a;font-weight:600">Savienots ar Google Calendar</span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="calDisconnect()" style="color:#e05555">Atvienot</button>`;
  } else {
    el.innerHTML = `
      <div class="row" style="gap:10px;margin-bottom:14px">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0"></div>
        <span style="font-size:13px;color:var(--muted)">Nav savienots</span>
      </div>
      <button class="btn btn-gold" onclick="calConnect()">Savienot ar Google</button>`;
  }
}

async function calConnect() {
  try {
    const r = await fetch('/api/calendar/auth-url');
    const data = await r.json();
    if (data.url) window.location.href = data.url;
    else showToast(data.error || 'Kļūda');
  } catch { showToast('Nevar savienoties ar serveri'); }
}

async function calDisconnect() {
  if (!confirm('Atvienot Google Calendar?')) return;
  await fetch('/api/calendar/disconnect', { method: 'DELETE' });
  _calStatus = { ..._calStatus, connected: false };
  showToast('✓ Google Calendar atvienots');
  renderContent();
}

function showAddEventModal() {
  if (_calStatus && !_calStatus.connected) {
    showToast('Vispirms savienojies ar Google Calendar ⚙️');
    return;
  }
  const today = new Date().toISOString().split('T')[0];
  const ov = document.createElement('div');
  ov.className = 'overlay'; ov.id = 'add-event-ov';
  ov.innerHTML = `<div class="modal">
    <div class="modal-title">📅 Pievienot notikumu</div>
    <div class="modal-sub">Pievieno notikumu savā Google Calendar</div>
    <div class="col" style="gap:10px">
      <div>
        <div class="xs" style="color:var(--muted);margin-bottom:5px">Nosaukums *</div>
        <input type="text" id="ev-title" placeholder="Notikuma nosaukums...">
      </div>
      <div>
        <div class="xs" style="color:var(--muted);margin-bottom:5px">Datums *</div>
        <input type="date" id="ev-date" value="${today}" style="color-scheme:dark">
      </div>
      <div class="row" style="gap:8px">
        <div style="flex:1">
          <div class="xs" style="color:var(--muted);margin-bottom:5px">Sākums</div>
          <input type="time" id="ev-start" style="color-scheme:dark">
        </div>
        <div style="flex:1">
          <div class="xs" style="color:var(--muted);margin-bottom:5px">Beigas</div>
          <input type="time" id="ev-end" style="color-scheme:dark">
        </div>
      </div>
      <div>
        <div class="xs" style="color:var(--muted);margin-bottom:5px">Apraksts</div>
        <textarea id="ev-desc" placeholder="Papildinformācija..." rows="2"></textarea>
      </div>
      <div class="row" style="gap:8px;margin-top:8px">
        <button class="btn btn-ghost" onclick="closeAddEvent()" style="flex:1">Atcelt</button>
        <button class="btn btn-gold" onclick="submitAddEvent()" style="flex:1">Pievienot</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(ov);
  setTimeout(() => document.getElementById('ev-title')?.focus(), 50);
}

function closeAddEvent() { document.getElementById('add-event-ov')?.remove(); }

async function submitAddEvent() {
  const title = document.getElementById('ev-title')?.value.trim();
  const date = document.getElementById('ev-date')?.value;
  if (!title || !date) { showToast('Ievadi nosaukumu un datumu!'); return; }
  try {
    const r = await fetch('/api/calendar/events', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title, date,
        startTime: document.getElementById('ev-start')?.value || '',
        endTime: document.getElementById('ev-end')?.value || '',
        description: document.getElementById('ev-desc')?.value.trim() || '',
      }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);
    closeAddEvent();
    showToast('✓ Notikums pievienots Google Calendar!');
    initDashboardCalendar();
  } catch (err) { showToast('Kļūda: ' + (err.message || 'Neizdevās')); }
}

// ─── INIT ─────────────────────────────────────────────────
function init() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('gcal_connected')) {
    _calStatus = null;
    S.sec = 'settings';
    window.history.replaceState({}, '', '/');
  }
  if (params.get('gcal_error')) {
    S.sec = 'settings';
    window.history.replaceState({}, '', '/');
  }

  renderNav();
  renderContent();
  renderLS();
  initChat();

  if (params.get('gcal_connected')) showToast('✓ Google Calendar pievienots!');
  if (params.get('gcal_error')) showToast('⚠️ Google Calendar savienošanās kļūda');

  const ci=document.getElementById('chat-in');
  ci.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';});
  ci.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
  document.getElementById('chat-send').addEventListener('click',sendMsg);
}

init();
</script>
</body>
</html>
